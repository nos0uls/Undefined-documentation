site_name: Undefinedtale-888 Docs
site_url: https://nos0uls.github.io/Undefined-documentation
site_author: n0souls
site_description: Официальная документация проекта Undefinedtale-888

repo_name: nos0uls/Undefined-documentation
repo_url: https://github.com/nos0uls/Undefined-documentation
edit_uri: edit/main/docs/

nav:
  - Главная: index.md
  - Начало работы:
      - Установка и Настройка: getting-started/setup.md
      - Структура Проекта: getting-started/project-structure.md
      - Первый Запуск: getting-started/first-run.md
      - Синтаксис Markdown: getting-started/syntax.md
  - Архитектура:
      - Обзор: architecture/overview.md
      - Инициализация: architecture/initialization.md
      - Глобальное Состояние: architecture/global-state.md
      - Объекты: architecture/objects.md
      - Комнаты: architecture/rooms.md
  - Системы:
      - Ввод (Input): systems/input.md
      - Взаимодействие: systems/interaction.md
      - Интерфейс (UI): systems/ui.md
      - Карта тонкой настройки UI: systems/ui-tuning-map.md
      - Музыка: systems/music.md
      - Портреты диалога: systems/dialogue-portraits.md
      - Катсцены:
          - Обзор: systems/cutscenes/overview.md
          - API: systems/cutscenes/api.md
          - Актёры: systems/cutscenes/actors.md
          - Камера: systems/cutscenes/camera.md
          - Игрок в катсцене: systems/cutscenes/player_in_cutscene.md
          - Отладка: systems/cutscenes/debugging.md
          - Примеры: systems/cutscenes/examples.md
          - Troubleshooting: systems/cutscenes/troubleshooting.md
  - Редактор (Undefscene):
      - Обзор: systems/cutscenes/undefscene/overview.md
      - Интерфейс и Preferences: systems/cutscenes/undefscene/ui.md
      - Workflow: systems/cutscenes/undefscene/workflow.md
      - Интеграция с проектом: systems/cutscenes/undefscene/integration.md
      - Room Screenshot Pipeline: systems/cutscenes/undefscene/room-screenshot-pipeline.md
      - Форматы и экспорт: systems/cutscenes/undefscene/formats.md
      - FAQ и troubleshooting: systems/cutscenes/undefscene/faq.md
  - Геймплей:
      - Обзор: gameplay/overview.md
      - Управление: gameplay/controls.md
      - Механики: gameplay/mechanics.md
  - Планирование:
      - Ревью:
          - 28.12.2025: planning/reviews/review_2025-12-28.md
          - 15.01.2026: planning/reviews/review_2026-01-15.md
  - Справочник кода:
      - GML скрипты: code-reference/gml-scripts.md
      - События объектов: code-reference/events.md
      - Функции: code-reference/functions.md

theme:
  name: material
  language: ru
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.tracking
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tooltips
    - content.action.edit
  palette:
    - scheme: slate       # по умолчанию тёмная тема
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-7
        name: Переключить на светлую тему
    - scheme: default     # светлая (альтернатива)
      primary: deep purple
      accent: purple
      toggle:
        icon: material/brightness-4
        name: Переключить на тёмную тему
  icon:
    logo: material/gamepad-variant
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/stylesheets/extra.css

extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.0/es5/tex-mml-chtml.min.js

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - toc:
      permalink: true
      title: Содержание
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true
      extend_pygments_lang:
        - name: gml
          lang: javascript
          options:
            startinline: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: ru
  - git-revision-date-localized:
      enable_creation_date: true
      type: datetime
      locale: ru
      enable_git_follow: false
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/n0souls
    - icon: fontawesome/brands/telegram
      link: https://telegram.org/n0souls

copyright: Copyright &copy; 2025 n0souls
